version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "DATABASE_URL set=$( [ -n "$DATABASE_URL" ] && echo YES || echo NO )"
        - echo "OPENAI_API_KEY set=$( [ -n "$OPENAI_API_KEY" ] && echo YES || echo NO )"
        - echo "SESSION_SECRET set=$( [ -n "$SESSION_SECRET" ] && echo YES || echo NO )"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
